<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1e3a8a" />
      <stop offset="0.4" stop-color="#5b21b6" />
      <stop offset="1" stop-color="#9333ea" />
    </linearGradient>
    <linearGradient id="shine" x1="40" y1="40" x2="360" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff" stop-opacity="0.2" />
      <stop offset="0.5" stop-color="#fff" stop-opacity="0.04" />
      <stop offset="1" stop-color="#fff" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="faceGrad" x1="156" y1="130" x2="356" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff" stop-opacity="0.2" />
      <stop offset="1" stop-color="#fff" stop-opacity="0.08" />
    </linearGradient>
    <clipPath id="clip">
      <rect width="512" height="512" rx="108" />
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)" />
  <rect width="512" height="512" rx="108" fill="url(#shine)" />

  <g clip-path="url(#clip)">
    <rect x="4" y="4" width="504" height="504" rx="106" fill="none" stroke="#fff" stroke-opacity="0.06" stroke-width="1.5" />

    <!-- Ear connectors (drawn first, behind head) -->
    <line x1="134" y1="236" x2="108" y2="236" stroke="#c4b5fd" stroke-opacity="0.5" stroke-width="5" stroke-linecap="round" />
    <circle cx="96" cy="236" r="10" fill="#7c3aed" fill-opacity="0.35" stroke="#c4b5fd" stroke-opacity="0.55" stroke-width="2.5" />
    <circle cx="96" cy="236" r="3.5" fill="#e9d5ff" fill-opacity="0.7" />

    <line x1="378" y1="236" x2="404" y2="236" stroke="#c4b5fd" stroke-opacity="0.5" stroke-width="5" stroke-linecap="round" />
    <circle cx="416" cy="236" r="10" fill="#7c3aed" fill-opacity="0.35" stroke="#c4b5fd" stroke-opacity="0.55" stroke-width="2.5" />
    <circle cx="416" cy="236" r="3.5" fill="#e9d5ff" fill-opacity="0.7" />

    <!-- Bottom connectors (drawn behind head) -->
    <line x1="200" y1="354" x2="200" y2="396" stroke="#c4b5fd" stroke-opacity="0.4" stroke-width="4" stroke-linecap="round" />
    <circle cx="200" cy="406" r="8" fill="#7c3aed" fill-opacity="0.3" stroke="#c4b5fd" stroke-opacity="0.45" stroke-width="2" />
    <circle cx="200" cy="406" r="3" fill="#e9d5ff" fill-opacity="0.6" />

    <line x1="256" y1="354" x2="256" y2="406" stroke="#c4b5fd" stroke-opacity="0.45" stroke-width="4" stroke-linecap="round" />
    <circle cx="256" cy="416" r="10" fill="#7c3aed" fill-opacity="0.35" stroke="#c4b5fd" stroke-opacity="0.5" stroke-width="2.5" />
    <circle cx="256" cy="416" r="4" fill="#e9d5ff" fill-opacity="0.7" />

    <line x1="312" y1="354" x2="312" y2="396" stroke="#c4b5fd" stroke-opacity="0.4" stroke-width="4" stroke-linecap="round" />
    <circle cx="312" cy="406" r="8" fill="#7c3aed" fill-opacity="0.3" stroke="#c4b5fd" stroke-opacity="0.45" stroke-width="2" />
    <circle cx="312" cy="406" r="3" fill="#e9d5ff" fill-opacity="0.6" />

    <!-- Antenna stem (drawn behind head, head will cover overlap) -->
    <line x1="256" y1="140" x2="256" y2="84" stroke="#c4b5fd" stroke-opacity="0.65" stroke-width="7" stroke-linecap="round" />
    <circle cx="256" cy="72" r="12" fill="#c4b5fd" fill-opacity="0.45" />
    <circle cx="256" cy="72" r="6" fill="#e9d5ff" fill-opacity="0.9" />

    <!-- Head (drawn on top, covers connector/antenna overlaps) -->
    <rect x="138" y="134" width="236" height="216" rx="48" fill="url(#faceGrad)" stroke="#fff" stroke-opacity="0.7" stroke-width="7" />
    <rect x="158" y="146" width="196" height="80" rx="34" fill="#fff" fill-opacity="0.04" />

    <!-- Eyes -->
    <circle cx="214" cy="230" r="24" fill="#fff" fill-opacity="0.92" />
    <circle cx="298" cy="230" r="24" fill="#fff" fill-opacity="0.92" />

    <!-- Mouth -->
    <path d="M224 300 Q256 320 288 300" fill="none" stroke="#fff" stroke-opacity="0.55" stroke-width="6" stroke-linecap="round" />
  </g>
</svg>
